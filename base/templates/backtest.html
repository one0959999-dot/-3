<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백테스트</title>
<style>
  :root {
    --bg:#0e1117;--card:#161b22;--border:#30363d;
    --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
    --green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;}
  header a{color:var(--muted);text-decoration:none;font-size:13px;}
  header a:hover{color:var(--text);}
  header h1{font-size:16px;font-weight:600;}
  .main{max-width:1200px;margin:0 auto;padding:24px 16px;}

  /* 실행 패널 */
  .run-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .run-panel h2{font-size:14px;font-weight:600;flex:1;}
  .mode-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;}
  .btn{padding:8px 20px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-run{background:var(--green);color:#000;}
  .btn-stop{background:var(--red);color:#fff;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .status-badge{font-size:12px;padding:4px 12px;border-radius:12px;font-weight:600;}
  .status-running{background:rgba(63,185,80,.15);color:var(--green);animation:pulse 1.5s infinite;}
  .status-idle{background:var(--bg);color:var(--muted);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .progress-text{font-size:12px;color:var(--muted);}

  /* 통계 */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
  .stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .stat-card .value{font-size:26px;font-weight:700;margin-top:4px;}

  /* 탭 */
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab{padding:10px 20px;cursor:pointer;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .tab.active{color:var(--text);border-color:var(--accent);}

  /* 검색 */
  .search-bar{margin-bottom:16px;}
  .search-bar input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;}
  .search-bar input:focus{outline:none;border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid var(--border);}
  tr:hover td{background:rgba(255,255,255,.03);}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
  .badge-kr{background:#1f3a5f;color:#58a6ff;}
  .badge-us{background:#2d1b4e;color:#bc8cff;}
  .badge-bottom{background:rgba(63,185,80,.15);color:var(--green);}
  .badge-top{background:rgba(248,81,73,.15);color:var(--red);}
  .pos{color:var(--green);}
  .neg{color:var(--red);}
  .muted{color:var(--muted);}
  .btn-detail{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 10px;color:var(--accent);font-size:11px;cursor:pointer;}
  .btn-detail:hover{background:rgba(88,166,255,.1);}
  .empty{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
  .loader{text-align:center;padding:40px;color:var(--muted);}

  /* 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:10px;width:94%;max-width:1000px;max-height:90vh;display:flex;flex-direction:column;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-head h2{font-size:15px;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .modal-body{overflow-y:auto;flex:1;}
  .modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);}
  .modal-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;}
  .modal-stat .val{font-size:18px;font-weight:700;margin-top:2px;}

  .analysis-row{display:none;}
  .analysis-row.open{display:table-row;}
  .analysis-cell{background:var(--bg);padding:14px 20px;font-size:12px;color:var(--muted);line-height:1.8;border-bottom:1px solid var(--border);}
  .analysis-cell strong{color:var(--text);}
</style>
</head>
<body>
<header>
  <a href="/">← 홈</a>
  <h1>백테스트</h1>
  <span id="lastRefresh" style="margin-left:auto;font-size:12px;color:var(--muted)"></span>
</header>

<div class="main">

  <!-- 실행 패널 -->
  <div class="run-panel">
    <h2>상장일 ~ 현재 전체 구간 신호 기반 백테스트</h2>
    <select class="mode-select" id="modeSelect">
      <option value="ALL">KR + US 전체</option>
      <option value="KR">KR 한국만</option>
      <option value="US">US 미국만</option>
    </select>
    <button class="btn btn-run" id="btnRun" onclick="startBacktest()">▶ 실행</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopBacktest()" style="display:none">■ 중단</button>
    <span class="status-badge status-idle" id="statusBadge">대기 중</span>
    <span class="progress-text" id="progressText"></span>
  </div>

  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card"><div class="label">수집된 신호</div><div class="value" style="color:var(--accent)" id="sTotal">—</div></div>
    <div class="stat-card"><div class="label">오늘 수집</div><div class="value" id="sToday">—</div></div>
    <div class="stat-card"><div class="label">KR 완료 종목</div><div class="value" style="color:var(--green)" id="sKR">—</div></div>
    <div class="stat-card"><div class="label">US 완료 종목</div><div class="value" style="color:var(--purple)" id="sUS">—</div></div>
    <div class="stat-card"><div class="label">BUY 신호 평균 최대수익</div><div class="value" style="color:var(--green)" id="sGain">—</div></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('KR',this)">KR 한국</div>
    <div class="tab" onclick="switchTab('US',this)">US 미국</div>
  </div>

  <!-- 방식 랭킹 (OOS 검증) + 1~5등 결론 -->
  <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:16px;margin-bottom:22px;">
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-weight:700;font-size:14px;">📊 방식 랭킹</span>
        <select id="phaseSel" onchange="loadMethodRanking(curTab)" style="font-size:12px;background:var(--card,#1a1a2e);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:3px 6px;">
          <option value="">전체</option>
          <option value="PANIC">패닉</option>
          <option value="BEAR_EARLY">하락초기</option>
          <option value="BEAR_MID">하락중반</option>
          <option value="BEAR_LATE">하락말기</option>
          <option value="SIDEWAYS">횡보장</option>
          <option value="BULL_EARLY">상승초기</option>
          <option value="BULL_MID">상승중반</option>
          <option value="BULL_LATE">상승말기</option>
        </select>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">만들기(~2020)·검증(2021~) 둘 다 강한 순 · 🤖봇/⚪단순보유 기준선 비교 · 클릭→결론</div>
      <div id="methodRankWrap"><div class="loader">로딩 중…</div></div>
    </div>
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px 16px;">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;">🏁 1~5등 방식 결론</div>
      <div id="methodConcWrap"><div class="loader">로딩 중…</div></div>
    </div>
  </div>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="종목명 / 티커 검색…" oninput="renderTable()">
  </div>

  <div id="tableWrap"><div class="loader">로딩 중…</div></div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">포인트 상세</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="modalStats"></div>
      <div id="modalTableWrap"><div class="loader">로딩 중…</div></div>
    </div>
  </div>
</div>

<script>
let allData = [], curTab = 'KR';

/* ── 실행 / 중단 ── */
async function startBacktest() {
  const mode = document.getElementById('modeSelect').value;
  const r = await fetch('/api/backtest/run', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mode})
  });
  const d = await r.json();
  if (d.error) { alert(d.error); return; }
  updateStatusUI(true);
}

async function stopBacktest() {
  await fetch('/api/backtest/stop', {method:'POST'});
  updateStatusUI(false);
}

function updateStatusUI(running) {
  document.getElementById('btnRun').style.display  = running ? 'none' : '';
  document.getElementById('btnStop').style.display = running ? '' : 'none';
  const badge = document.getElementById('statusBadge');
  badge.textContent  = running ? '실행 중…' : '대기 중';
  badge.className    = 'status-badge ' + (running ? 'status-running' : 'status-idle');
}

async function pollStatus() {
  try {
    const r = await fetch('/api/backtest/status');
    const d = await r.json();
    updateStatusUI(d.running);
    if (d.running) {
      document.getElementById('progressText').textContent =
        d.started_at ? `시작: ${d.started_at}` : '';
    } else {
      document.getElementById('progressText').textContent = '';
    }
  } catch(e) {}
}

/* ── 통계 ── */
async function loadStats() {
  try {
    const r = await fetch('/api/backtest/stats');
    const d = await r.json();
    document.getElementById('sTotal').textContent = (d.total_points||0).toLocaleString();
    document.getElementById('sToday').textContent = (d.today_points||0).toLocaleString();
    document.getElementById('sKR').textContent    = (d.kr_tickers||0).toLocaleString();
    document.getElementById('sUS').textContent    = (d.us_tickers||0).toLocaleString();
    const gain = d.avg_max_gain_buy;
    document.getElementById('sGain').textContent = gain ? '+' + gain + '%' : '—';
  } catch(e) {}
}

/* ── 이력 테이블 ── */
async function loadHistory() {
  document.getElementById('tableWrap').innerHTML = '<div class="loader">로딩 중…</div>';
  try {
    const r = await fetch('/api/backtest/history');
    allData = await r.json();
    document.getElementById('lastRefresh').textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR');
  } catch(e) { allData = []; }
  renderTable();
}

function switchTab(mode, el) {
  curTab = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderTable();
  loadMethodRanking(mode);
}

// ── 방식 랭킹 (OOS 검증) ──────────────────────────────────────────
let _methodData = [];
async function loadMethodRanking(mode) {
  const rankWrap = document.getElementById('methodRankWrap');
  const concWrap = document.getElementById('methodConcWrap');
  rankWrap.innerHTML = '<div class="loader">로딩 중…</div>';
  concWrap.innerHTML = '<div class="loader">로딩 중…</div>';
  const phase = (document.getElementById('phaseSel')||{}).value || '';
  try {
    const r = await fetch(`/api/backtest/method_ranking?mode=${mode}&phase=${phase}`);
    const d = await r.json();
    _methodData = d.methods || [];
  } catch(e) { _methodData = []; }
  if (!_methodData.length) {
    rankWrap.innerHTML = '<div style="color:var(--muted);font-size:12px;">데이터 없음</div>';
    concWrap.innerHTML = ''; return;
  }
  const vColor = v => v.includes('초과')||v.includes('채택') ? '#22c55e' : v.includes('노이즈')||v.includes('미달') ? '#ef4444'
                    : v.includes('기준선') ? '#60a5fa' : '#eab308';
  rankWrap.innerHTML = _methodData.map((m,i) => {
    const base = (m.kind||'').startsWith('baseline');
    const dlt = (m.vs_bot!=null) ? ` <span style="color:${m.vs_bot>=0?'#22c55e':'#ef4444'};font-size:11px;">${m.vs_bot>=0?'+':''}${m.vs_bot}%p</span>` : '';
    return `
    <div onclick="showMethodConc(${i})" style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:5px;background:${base?'rgba(96,165,250,0.10)':(i<6?'rgba(99,102,241,0.05)':'transparent')};border:1px solid var(--border);">
      <span><b style="color:var(--accent);">${m.rank}위</b> &nbsp;${m.method}${dlt}</span>
      <span style="font-size:12px;"><span style="color:${vColor(m.verdict)};">${m.verdict.split(' ')[0]}</span> &nbsp;<b>${m.score}</b></span>
    </div>`; }).join('');
  // 결론: 1~5등 전부 표시
  concWrap.innerHTML = _methodData.slice(0,5).map(m => `
    <div style="padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;">
      <div style="font-weight:700;margin-bottom:4px;"><span style="color:var(--accent);">${m.rank}위</span> ${m.method} &nbsp;<span style="color:${vColor(m.verdict)};font-size:12px;">${m.verdict}</span></div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap;">${m.conclusion.split('\n').slice(1).join('\n')}</div>
    </div>`).join('');
}
function showMethodConc(i) {
  const m = _methodData[i]; if(!m) return;
  const vColor = m.verdict.includes('채택') ? '#22c55e' : m.verdict.includes('노이즈') ? '#ef4444' : '#eab308';
  document.getElementById('methodConcWrap').innerHTML = `
    <div style="padding:12px 14px;border-radius:8px;border:1px solid var(--border);">
      <div style="font-weight:700;font-size:15px;margin-bottom:6px;"><span style="color:var(--accent);">${m.rank}위</span> ${m.method} &nbsp;<span style="color:${vColor};font-size:13px;">${m.verdict}</span></div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-wrap;">${m.conclusion}</div>
    </div>`;
}

function pStr(v, suffix='%') {
  if (v == null || v === '') return '—';
  return (v > 0 ? '+' : '') + v + suffix;
}
function pClass(v) {
  return v == null ? 'muted' : v > 0 ? 'pos' : v < 0 ? 'neg' : 'muted';
}

function renderTable() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const rows = allData.filter(r =>
    r.mode === curTab &&
    (!q || (r.ticker||'').toLowerCase().includes(q) || (r.stock_name||'').toLowerCase().includes(q))
  );

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="empty">아직 백테스트 데이터가 없습니다.<br>▶ 실행 버튼을 눌러 시작하세요.</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>종목</th><th>티커</th><th>완료일</th><th>섹터</th>
    <th>BUY</th><th>SELL</th>
    <th>신호매매 수익</th><th>1000만→</th><th>평균 최대수익</th>
    <th></th>
  </tr></thead><tbody>`;

  for (const r of rows) {
    const date = String(r.completed_at||r.last_processed_date||'').slice(0,10);
    const finalVal = r.final_value_10m ? Math.round(r.final_value_10m).toLocaleString()+'원' : '—';
    html += `<tr>
      <td>${r.stock_name||r.ticker}</td>
      <td><span class="badge ${curTab==='KR'?'badge-kr':'badge-us'}">${r.ticker}</span></td>
      <td class="muted" style="font-size:12px">${date}</td>
      <td class="muted" style="font-size:11px">${r.sector||'—'}</td>
      <td><span class="badge badge-bottom">${(r.buy_signals||0)}개</span></td>
      <td><span class="badge badge-top">${(r.sell_signals||0)}개</span></td>
      <td class="${pClass(r.return_pct)}">${pStr(r.return_pct)}</td>
      <td class="${pClass(r.return_pct)}" style="font-size:12px">${finalVal}</td>
      <td class="${pClass(r.avg_max_gain)}">${pStr(r.avg_max_gain)}</td>
      <td><button class="btn-detail" onclick="openDetail('${curTab}','${r.ticker}','${r.stock_name||r.ticker}')">신호보기</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

/* ── 상세 모달 ── */
async function openDetail(mode, ticker, name) {
  document.getElementById('modalTitle').textContent = `${name}(${ticker}) — 신호 상세`;
  document.getElementById('modalStats').innerHTML = '';
  document.getElementById('modalTableWrap').innerHTML = '<div class="loader">로딩 중…</div>';
  document.getElementById('detailModal').classList.add('open');

  try {
    const r = await fetch(`/api/backtest/ticker/${mode}/${ticker}`);
    const pts = await r.json();
    renderModal(pts);
  } catch(e) {
    document.getElementById('modalTableWrap').innerHTML = '<div class="empty">데이터 없음</div>';
  }
}

function renderModal(pts) {
  const buys  = pts.filter(p => p.signal_direction === 'BUY');
  const sells = pts.filter(p => p.signal_direction === 'SELL');
  const avgGain = buys.length
    ? (buys.reduce((a,p) => a+(p.max_gain_pct||0), 0)/buys.length).toFixed(1)
    : null;
  const avgDays = buys.length
    ? Math.round(buys.reduce((a,p) => a+(p.days_to_peak||0), 0)/buys.length)
    : null;

  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="lbl">총 신호</div><div class="val">${pts.length}</div></div>
    <div class="modal-stat"><div class="lbl">BUY</div><div class="val" style="color:var(--green)">${buys.length}</div></div>
    <div class="modal-stat"><div class="lbl">SELL</div><div class="val" style="color:var(--red)">${sells.length}</div></div>
    <div class="modal-stat"><div class="lbl">BUY 평균 최대수익</div><div class="val" style="color:var(--green)">${avgGain!=null?'+'+avgGain+'%':'—'}</div></div>
    <div class="modal-stat"><div class="lbl">평균 고점 도달일</div><div class="val" style="color:var(--accent)">${avgDays!=null?avgDays+'일':'—'}</div></div>
  `;

  if (!pts.length) {
    document.getElementById('modalTableWrap').innerHTML = '<div class="empty">데이터 없음</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>날짜</th><th>방향</th><th>가격</th><th>국면</th>
    <th>RSI</th><th>신호 종류</th>
    <th>최대수익</th><th>고점(일)</th><th>최대낙폭</th><th></th>
  </tr></thead><tbody>`;

  pts.forEach((p, i) => {
    const isBuy = p.signal_direction === 'BUY';
    const dirEl = isBuy
      ? '<span class="badge badge-bottom">▲ BUY</span>'
      : '<span class="badge badge-top">▼ SELL</span>';
    let sigs = [];
    try { sigs = JSON.parse(p.signal_types||'[]'); } catch(e) {}

    html += `<tr id="pr-${i}">
      <td style="font-size:12px;color:var(--muted)">${p.trade_date||''}</td>
      <td>${dirEl}</td>
      <td>${Number(p.price||0).toLocaleString()}</td>
      <td style="font-size:11px;color:var(--muted)">${p.market_phase_kr||'—'}</td>
      <td style="font-size:12px">${p.rsi!=null?Number(p.rsi).toFixed(1):'—'}</td>
      <td style="font-size:11px;color:var(--accent)">${sigs.join(' · ')}</td>
      <td class="${pClass(p.max_gain_pct)}">${pStr(p.max_gain_pct)}</td>
      <td class="muted" style="font-size:12px">${p.days_to_peak!=null?p.days_to_peak+'일':'—'}</td>
      <td class="${pClass(p.max_drawdown_pct)}">${pStr(p.max_drawdown_pct)}</td>
      <td><button class="btn-detail" onclick="toggleAnalysis(${i})">▾ AI</button></td>
    </tr>
    <tr id="ar-${i}" class="analysis-row">
      <td colspan="10" class="analysis-cell">
        <strong>AI 분석:</strong><br>
        ${(p.ai_analysis||'분석 없음').replace(/\n/g,'<br>')}
        <br><br>
        <strong>볼린저:</strong> ${Number(p.bb_lower||0).toLocaleString()} ~ ${Number(p.bb_upper||0).toLocaleString()} &nbsp;
        <strong>거래량:</strong> 평소대비 ${p.vol_ratio||'—'}% &nbsp;
        <strong>회복까지:</strong> ${p.days_to_recovery!=null?p.days_to_recovery+'일':'미회복'}
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('modalTableWrap').innerHTML = html;
}

function toggleAnalysis(i) {
  document.getElementById(`ar-${i}`).classList.toggle('open');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* ── 초기화 + 폴링 ── */
loadStats();
loadHistory();
loadMethodRanking('KR');
pollStatus();
setInterval(() => { pollStatus(); loadStats(); }, 10000);
setInterval(loadHistory, 60000);
</script>
</body>
</html>

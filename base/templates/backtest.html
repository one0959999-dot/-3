<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백테스트</title>
<style>
  :root {
    --bg:#0e1117;--card:#161b22;--border:#30363d;
    --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
    --green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;}
  header a{color:var(--muted);text-decoration:none;font-size:13px;}
  header a:hover{color:var(--text);}
  header h1{font-size:16px;font-weight:600;}
  .main{max-width:1200px;margin:0 auto;padding:24px 16px;}

  /* 실행 패널 */
  .run-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .run-panel h2{font-size:14px;font-weight:600;flex:1;}
  .mode-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;}
  .btn{padding:8px 20px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-run{background:var(--green);color:#000;}
  .btn-stop{background:var(--red);color:#fff;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .status-badge{font-size:12px;padding:4px 12px;border-radius:12px;font-weight:600;}
  .status-running{background:rgba(63,185,80,.15);color:var(--green);animation:pulse 1.5s infinite;}
  .status-idle{background:var(--bg);color:var(--muted);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .progress-text{font-size:12px;color:var(--muted);}

  /* 통계 */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
  .stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .stat-card .value{font-size:26px;font-weight:700;margin-top:4px;}

  /* 탭 */
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab{padding:10px 20px;cursor:pointer;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .tab.active{color:var(--text);border-color:var(--accent);}

  /* 검색 */
  .search-bar{margin-bottom:16px;}
  .search-bar input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;}
  .search-bar input:focus{outline:none;border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid var(--border);}
  tr:hover td{background:rgba(255,255,255,.03);}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
  .badge-kr{background:#1f3a5f;color:#58a6ff;}
  .badge-us{background:#2d1b4e;color:#bc8cff;}
  .badge-bottom{background:rgba(63,185,80,.15);color:var(--green);}
  .badge-top{background:rgba(248,81,73,.15);color:var(--red);}
  .pos{color:var(--green);}
  .neg{color:var(--red);}
  .muted{color:var(--muted);}
  .btn-detail{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 10px;color:var(--accent);font-size:11px;cursor:pointer;}
  .btn-detail:hover{background:rgba(88,166,255,.1);}
  .empty{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
  .loader{text-align:center;padding:40px;color:var(--muted);}

  /* 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:10px;width:94%;max-width:1000px;max-height:90vh;display:flex;flex-direction:column;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-head h2{font-size:15px;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .modal-body{overflow-y:auto;flex:1;}
  .modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);}
  .modal-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;}
  .modal-stat .val{font-size:18px;font-weight:700;margin-top:2px;}

  .analysis-row{display:none;}
  .analysis-row.open{display:table-row;}
  .analysis-cell{background:var(--bg);padding:14px 20px;font-size:12px;color:var(--muted);line-height:1.8;border-bottom:1px solid var(--border);}
  .analysis-cell strong{color:var(--text);}
</style>
</head>
<body>
<header>
  <a href="/">← 홈</a>
  <h1>백테스트</h1>
  <span id="lastRefresh" style="margin-left:auto;font-size:12px;color:var(--muted)"></span>
</header>

<div class="main">

  <!-- 실행 패널 -->
  <div class="run-panel">
    <h2>상장일 ~ 현재 전체 구간 바닥/고점 분석</h2>
    <select class="mode-select" id="modeSelect">
      <option value="ALL">KR + US 전체</option>
      <option value="KR">KR 한국만</option>
      <option value="US">US 미국만</option>
    </select>
    <button class="btn btn-run" id="btnRun" onclick="startBacktest()">▶ 실행</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopBacktest()" style="display:none">■ 중단</button>
    <span class="status-badge status-idle" id="statusBadge">대기 중</span>
    <span class="progress-text" id="progressText"></span>
  </div>

  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card"><div class="label">수집된 포인트</div><div class="value" style="color:var(--accent)" id="sTotal">—</div></div>
    <div class="stat-card"><div class="label">오늘 수집</div><div class="value" id="sToday">—</div></div>
    <div class="stat-card"><div class="label">KR 완료 종목</div><div class="value" style="color:var(--green)" id="sKR">—</div></div>
    <div class="stat-card"><div class="label">US 완료 종목</div><div class="value" style="color:var(--purple)" id="sUS">—</div></div>
    <div class="stat-card"><div class="label">바닥 후 60일 평균 최대수익</div><div class="value" style="color:var(--green)" id="sGain">—</div></div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('KR',this)">KR 한국</div>
    <div class="tab" onclick="switchTab('US',this)">US 미국</div>
  </div>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="종목명 / 티커 검색…" oninput="renderTable()">
  </div>

  <div id="tableWrap"><div class="loader">로딩 중…</div></div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">포인트 상세</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="modalStats"></div>
      <div id="modalTableWrap"><div class="loader">로딩 중…</div></div>
    </div>
  </div>
</div>

<script>
let allData = [], curTab = 'KR';

/* ── 실행 / 중단 ── */
async function startBacktest() {
  const mode = document.getElementById('modeSelect').value;
  const r = await fetch('/api/backtest/run', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mode})
  });
  const d = await r.json();
  if (d.error) { alert(d.error); return; }
  updateStatusUI(true);
}

async function stopBacktest() {
  await fetch('/api/backtest/stop', {method:'POST'});
  updateStatusUI(false);
}

function updateStatusUI(running) {
  document.getElementById('btnRun').style.display  = running ? 'none' : '';
  document.getElementById('btnStop').style.display = running ? '' : 'none';
  const badge = document.getElementById('statusBadge');
  badge.textContent  = running ? '실행 중…' : '대기 중';
  badge.className    = 'status-badge ' + (running ? 'status-running' : 'status-idle');
}

async function pollStatus() {
  try {
    const r = await fetch('/api/backtest/status');
    const d = await r.json();
    updateStatusUI(d.running);
    if (d.running) {
      document.getElementById('progressText').textContent =
        d.started_at ? `시작: ${d.started_at}` : '';
    } else {
      document.getElementById('progressText').textContent = '';
    }
  } catch(e) {}
}

/* ── 통계 ── */
async function loadStats() {
  try {
    const r = await fetch('/api/backtest/stats');
    const d = await r.json();
    document.getElementById('sTotal').textContent = (d.total_points||0).toLocaleString();
    document.getElementById('sToday').textContent = (d.today_points||0).toLocaleString();
    document.getElementById('sKR').textContent    = (d.kr_tickers||0).toLocaleString();
    document.getElementById('sUS').textContent    = (d.us_tickers||0).toLocaleString();
    const gain = d.avg_max_gain_bottom;
    document.getElementById('sGain').textContent = gain ? '+' + gain + '%' : '—';
  } catch(e) {}
}

/* ── 이력 테이블 ── */
async function loadHistory() {
  document.getElementById('tableWrap').innerHTML = '<div class="loader">로딩 중…</div>';
  try {
    const r = await fetch('/api/backtest/history');
    allData = await r.json();
    document.getElementById('lastRefresh').textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR');
  } catch(e) { allData = []; }
  renderTable();
}

function switchTab(mode, el) {
  curTab = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderTable();
}

function pStr(v, suffix='%') {
  if (v == null || v === '') return '—';
  return (v > 0 ? '+' : '') + v + suffix;
}
function pClass(v) {
  return v == null ? 'muted' : v > 0 ? 'pos' : v < 0 ? 'neg' : 'muted';
}

function renderTable() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const rows = allData.filter(r =>
    r.mode === curTab &&
    (!q || (r.ticker||'').toLowerCase().includes(q) || (r.stock_name||'').toLowerCase().includes(q))
  );

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="empty">아직 백테스트 데이터가 없습니다.<br>▶ 실행 버튼을 눌러 시작하세요.</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>종목</th><th>티커</th><th>완료일</th>
    <th>바닥</th><th>고점</th>
    <th>바닥 후 20일 평균</th><th>60일 최대수익</th>
    <th></th>
  </tr></thead><tbody>`;

  for (const r of rows) {
    const date = (r.completed_at||r.last_processed_date||'').slice(0,10);
    html += `<tr>
      <td>${r.stock_name||r.ticker}</td>
      <td><span class="badge ${curTab==='KR'?'badge-kr':'badge-us'}">${r.ticker}</span></td>
      <td class="muted" style="font-size:12px">${date}</td>
      <td><span class="badge badge-bottom">${(r.bottoms||0)}개</span></td>
      <td><span class="badge badge-top">${(r.tops||0)}개</span></td>
      <td class="${pClass(r.avg_pnl_20d)}">${pStr(r.avg_pnl_20d)}</td>
      <td class="${pClass(r.avg_max_gain_60d)}">${pStr(r.avg_max_gain_60d)}</td>
      <td><button class="btn-detail" onclick="openDetail('${curTab}','${r.ticker}','${r.stock_name||r.ticker}')">분석보기</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

/* ── 상세 모달 ── */
async function openDetail(mode, ticker, name) {
  document.getElementById('modalTitle').textContent = `${name}(${ticker}) — 바닥/고점 분석`;
  document.getElementById('modalStats').innerHTML = '';
  document.getElementById('modalTableWrap').innerHTML = '<div class="loader">로딩 중…</div>';
  document.getElementById('detailModal').classList.add('open');

  try {
    const r = await fetch(`/api/backtest/ticker/${mode}/${ticker}`);
    const pts = await r.json();
    renderModal(pts);
  } catch(e) {
    document.getElementById('modalTableWrap').innerHTML = '<div class="empty">데이터 없음</div>';
  }
}

function renderModal(pts) {
  const bottoms = pts.filter(p => p.point_type === 'BOTTOM');
  const tops    = pts.filter(p => p.point_type === 'TOP');
  const avgGain = bottoms.length
    ? (bottoms.reduce((a,p) => a+(p.max_gain_60d||0), 0)/bottoms.length).toFixed(1)
    : '—';
  const avgPnl20 = pts.length
    ? (pts.reduce((a,p) => a+(p.pnl_20d||0), 0)/pts.length).toFixed(1)
    : '—';

  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="lbl">총 포인트</div><div class="val">${pts.length}</div></div>
    <div class="modal-stat"><div class="lbl">바닥</div><div class="val" style="color:var(--green)">${bottoms.length}</div></div>
    <div class="modal-stat"><div class="lbl">고점</div><div class="val" style="color:var(--red)">${tops.length}</div></div>
    <div class="modal-stat"><div class="lbl">바닥 후 60일 최대수익 평균</div><div class="val" style="color:var(--green)">${avgGain !== '—' ? '+'+avgGain+'%' : '—'}</div></div>
  `;

  if (!pts.length) {
    document.getElementById('modalTableWrap').innerHTML = '<div class="empty">데이터 없음</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>날짜</th><th>유형</th><th>가격</th><th>등락폭</th>
    <th>RSI</th><th>활성신호</th>
    <th>5일</th><th>20일</th><th>60일최대</th><th></th>
  </tr></thead><tbody>`;

  pts.forEach((p, i) => {
    const isBottom = p.point_type === 'BOTTOM';
    const typeEl   = isBottom
      ? '<span class="badge badge-bottom">▲ 바닥</span>'
      : '<span class="badge badge-top">▼ 고점</span>';
    const mag  = p.magnitude_pct ? (isBottom ? '-' : '+') + p.magnitude_pct + '%' : '—';
    let sigs = [];
    try { sigs = JSON.parse(p.signals_active||'[]'); } catch(e) {}

    html += `<tr id="pr-${i}">
      <td style="font-size:12px;color:var(--muted)">${p.date||''}</td>
      <td>${typeEl}</td>
      <td>${Number(p.price||0).toLocaleString()}</td>
      <td class="${isBottom?'neg':'pos'}">${mag}</td>
      <td style="font-size:12px">${p.rsi!=null?Number(p.rsi).toFixed(1):'—'}</td>
      <td style="font-size:11px;color:var(--muted)">${sigs.join(' ')}</td>
      <td class="${pClass(p.pnl_5d)}">${pStr(p.pnl_5d)}</td>
      <td class="${pClass(p.pnl_20d)}">${pStr(p.pnl_20d)}</td>
      <td class="${pClass(p.max_gain_60d)}">${pStr(p.max_gain_60d)}</td>
      <td><button class="btn-detail" onclick="toggleAnalysis(${i})">▾ AI</button></td>
    </tr>
    <tr id="ar-${i}" class="analysis-row">
      <td colspan="10" class="analysis-cell">
        <strong>AI 분석:</strong><br>
        ${(p.ai_analysis||'분석 없음').replace(/\n/g,'<br>')}
        <br><br>
        <strong>지지:</strong> ${Number(p.support||0).toLocaleString()} &nbsp;
        <strong>저항:</strong> ${Number(p.resistance||0).toLocaleString()} &nbsp;
        <strong>볼린저:</strong> ${Number(p.bb_lower||0).toLocaleString()}~${Number(p.bb_upper||0).toLocaleString()} &nbsp;
        <strong>거래량:</strong> 평소대비 ${p.vol_ratio||'—'}% <br>
        <strong>SMA5:</strong>${Number(p.sma5||0).toLocaleString()} &nbsp;
        <strong>SMA20:</strong>${Number(p.sma20||0).toLocaleString()} &nbsp;
        <strong>SMA60:</strong>${Number(p.sma60||0).toLocaleString()} &nbsp;
        <strong>SMA120:</strong>${Number(p.sma120||0).toLocaleString()} <br>
        <strong>60일 최대손실:</strong> <span class="neg">${pStr(p.max_loss_60d)}</span>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('modalTableWrap').innerHTML = html;
}

function toggleAnalysis(i) {
  document.getElementById(`ar-${i}`).classList.toggle('open');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* ── 초기화 + 폴링 ── */
loadStats();
loadHistory();
pollStatus();
setInterval(() => { pollStatus(); loadStats(); }, 10000);
setInterval(loadHistory, 60000);
</script>
</body>
</html>

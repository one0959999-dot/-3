<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>백테스트 — 라씨</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
      background: rgba(15,23,42,0.6); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo { font-weight: 800; font-size: 1.1rem; color: #e6edf3; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: #94a3b8; font-size: 0.82rem; text-decoration: none; padding: 6px 12px;
                border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; transition: color .15s, border-color .15s; }
    .nav-link:hover { color: #e6edf3; border-color: rgba(255,255,255,0.25); }
    .nav-link.active { color: #86efac; border-color: rgba(134,239,172,0.35); }

    .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: .3rem; }
    .page-sub   { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }

    /* ── 파라미터 패널 ── */
    .param-panel {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .param-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.2rem; }
    .param-group label { display: block; font-size: 0.72rem; font-weight: 600; color: #64748b;
                         text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
    .param-group input, .param-group select {
      width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: #e2e8f0; font-size: 0.85rem; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .param-group input:focus, .param-group select:focus { border-color: rgba(134,239,172,0.5); }
    .param-group select option { background: #1e2938; }
    .run-btn {
      padding: 10px 28px; background: rgba(134,239,172,0.15);
      border: 1px solid rgba(134,239,172,0.35); border-radius: 10px;
      color: #86efac; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .run-btn:hover { background: rgba(134,239,172,0.22); transform: translateY(-1px); }
    .run-btn:active { transform: translateY(0); }
    .run-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── 결과 요약 ── */
    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .res-card {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 1.1rem 1.3rem;
    }
    .res-label { font-size: 0.7rem; font-weight: 600; color: #64748b;
                 text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .res-value { font-size: 1.3rem; font-weight: 800; color: #f1f5f9; }
    .res-value.up   { color: #f87171; }
    .res-value.down { color: #60a5fa; }

    /* ── 자산 곡선 차트 ── */
    .chart-section {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .chart-title { font-size: 0.82rem; font-weight: 700; color: #94a3b8;
                   text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem; }
    #equity-chart { height: 240px !important; }

    /* ── 거래 내역 ── */
    .trades-section {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; overflow: hidden;
    }
    .trades-title { padding: 1.1rem 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.06);
                    font-size: 0.82rem; font-weight: 700; color: #94a3b8;
                    text-transform: uppercase; letter-spacing: .06em; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { padding: 9px 14px; text-align: left; color: #475569; font-weight: 600;
         font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em;
         border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.2); }
    td { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #cbd5e1; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody tr:last-child td { border: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
    .badge-buy  { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .badge-sell { background: rgba(239,68,68,0.15);  color: #f87171; }
    .up   { color: #f87171; }
    .down { color: #60a5fa; }
    .flat { color: #94a3b8; }

    .placeholder { padding: 3rem; text-align: center; color: #475569; font-size: 0.85rem; }
    .loading-txt  { color: #64748b; font-size: 0.85rem; }
    .error-txt    { color: #f87171; font-size: 0.82rem; background: rgba(239,68,68,0.1);
                    border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-logo">라씨 매매비서</a>
  <div class="nav-right">
    <a href="/" class="nav-link">홈</a>
    <a href="/dashboard" class="nav-link">대시보드</a>
    <a href="/report"    class="nav-link">📊 리포트</a>
    <a href="/backtest"  class="nav-link active">🔬 백테스트</a>
    <a href="/logout"    class="nav-link">로그아웃</a>
  </div>
</nav>

<main class="main">
  <div class="page-title">🔬 백테스트</div>
  <div class="page-sub">MA 크로스 + RSI 전략 시뮬레이션 — yfinance 일봉 기반</div>

  <!-- 파라미터 -->
  <div class="param-panel">
    <div class="param-grid">
      <div class="param-group">
        <label>종목 코드</label>
        <input id="p-ticker" type="text" placeholder="예: 005930 / NVDA" value="005930">
      </div>
      <div class="param-group">
        <label>시장</label>
        <select id="p-mode">
          <option value="KR">KR (한국)</option>
          <option value="US">US (미국)</option>
        </select>
      </div>
      <div class="param-group">
        <label>기간 (일)</label>
        <input id="p-period" type="number" value="180" min="30" max="1000">
      </div>
      <div class="param-group">
        <label>단기 MA</label>
        <input id="p-mafast" type="number" value="20" min="5" max="100">
      </div>
      <div class="param-group">
        <label>장기 MA</label>
        <input id="p-maslow" type="number" value="60" min="10" max="200">
      </div>
      <div class="param-group">
        <label>RSI 매수 기준</label>
        <input id="p-rsibuy" type="number" value="40" min="10" max="60">
      </div>
      <div class="param-group">
        <label>RSI 매도 기준</label>
        <input id="p-rsisell" type="number" value="70" min="50" max="90">
      </div>
      <div class="param-group">
        <label>초기자금 (원)</label>
        <input id="p-cash" type="number" value="10000000">
      </div>
    </div>
    <button class="run-btn" id="run-btn" onclick="runBacktest()">▶ 백테스트 실행</button>
  </div>

  <div id="error-box" style="display:none" class="error-txt"></div>

  <!-- 결과 카드 (처음엔 숨김) -->
  <div id="result-section" style="display:none">
    <div class="result-grid">
      <div class="res-card"><div class="res-label">총 수익</div><div class="res-value" id="r-pnl">—</div></div>
      <div class="res-card"><div class="res-label">수익률</div><div class="res-value" id="r-ret">—</div></div>
      <div class="res-card"><div class="res-label">최종자산</div><div class="res-value" id="r-final">—</div></div>
      <div class="res-card"><div class="res-label">매매횟수</div><div class="res-value flat" id="r-ntrades">—</div></div>
      <div class="res-card"><div class="res-label">승률</div><div class="res-value" id="r-winrate">—</div></div>
      <div class="res-card"><div class="res-label">평균 수익</div><div class="res-value up"   id="r-avgwin">—</div></div>
      <div class="res-card"><div class="res-label">평균 손실</div><div class="res-value down" id="r-avgloss">—</div></div>
    </div>

    <div class="chart-section">
      <div class="chart-title" id="equity-title">자산 곡선</div>
      <canvas id="equity-chart"></canvas>
    </div>

    <div class="trades-section">
      <div class="trades-title">매매 내역 (최근 30건)</div>
      <div id="bt-trades-body"></div>
    </div>
  </div>

  <div id="placeholder" class="placeholder">
    파라미터를 입력하고 ▶ 백테스트 실행을 누르세요
  </div>
</main>

<script>
let _equityChart = null;

function fmt(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const s   = abs >= 1e8 ? (abs/1e8).toFixed(1)+'억' : abs >= 1e4 ? Math.round(abs/1e4)+'만' : Math.round(abs)+'';
  return (n >= 0 ? '+' : '-') + s + '원';
}
function fmtN(n) { return n == null ? '—' : n.toLocaleString()+'원'; }
function cls(n)  { return n > 0 ? 'up' : n < 0 ? 'down' : 'flat'; }

async function runBacktest() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 계산 중...';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('placeholder').innerHTML = '<span class="loading-txt">데이터 다운로드 + 시뮬레이션 중...</span>';
  document.getElementById('placeholder').style.display = 'block';

  try {
    const body = {
      ticker:   document.getElementById('p-ticker').value.trim(),
      mode:     document.getElementById('p-mode').value,
      period:   parseInt(document.getElementById('p-period').value),
      ma_fast:  parseInt(document.getElementById('p-mafast').value),
      ma_slow:  parseInt(document.getElementById('p-maslow').value),
      rsi_buy:  parseFloat(document.getElementById('p-rsibuy').value),
      rsi_sell: parseFloat(document.getElementById('p-rsisell').value),
      init_cash: parseFloat(document.getElementById('p-cash').value),
    };

    const res  = await fetch('/api/backtest', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.error) {
      const eb = document.getElementById('error-box');
      eb.textContent = '오류: ' + data.error;
      eb.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      return;
    }

    renderResult(data);
  } catch(e) {
    const eb = document.getElementById('error-box');
    eb.textContent = '네트워크 오류: ' + e.message;
    eb.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 백테스트 실행';
    document.getElementById('placeholder').style.display = 'none';
  }
}

function renderResult(data) {
  const r = data.result;
  document.getElementById('result-section').style.display = 'block';

  const setPnl = (id, v) => {
    const el = document.getElementById(id);
    el.textContent = fmt(v); el.className = 'res-value ' + cls(v);
  };
  setPnl('r-pnl', r.total_pnl);
  const retEl = document.getElementById('r-ret');
  retEl.textContent = (r.total_ret >= 0 ? '+' : '') + r.total_ret + '%';
  retEl.className = 'res-value ' + cls(r.total_ret);
  document.getElementById('r-final').textContent   = fmtN(r.final_val);
  document.getElementById('r-ntrades').textContent = r.n_trades + '회';
  const wrEl = document.getElementById('r-winrate');
  wrEl.textContent = r.win_rate + '%';
  wrEl.className   = 'res-value ' + (r.win_rate >= 55 ? 'up' : r.win_rate >= 40 ? 'flat' : 'down');
  document.getElementById('r-avgwin').textContent  = fmt(r.avg_win);
  document.getElementById('r-avgloss').textContent = fmt(r.avg_loss);

  document.getElementById('equity-title').textContent =
    `자산 곡선 — ${data.ticker}  (MA${data.params.ma_fast}/${data.params.ma_slow}  RSI${data.params.rsi_buy}~${data.params.rsi_sell})`;

  // 자산 곡선 차트
  const eq = data.equity_curve;
  if (_equityChart) _equityChart.destroy();
  const ctx = document.getElementById('equity-chart').getContext('2d');
  const initCash = parseFloat(document.getElementById('p-cash').value);
  _equityChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: eq.map(e => e.date),
      datasets: [{
        data: eq.map(e => e.value),
        borderColor: r.total_ret >= 0 ? '#f87171' : '#60a5fa',
        backgroundColor: r.total_ret >= 0 ? 'rgba(248,113,113,0.08)' : 'rgba(96,165,250,0.08)',
        borderWidth: 1.5, fill: true, pointRadius: 0, tension: 0.3,
      }, {
        data: eq.map(() => initCash),
        borderColor: 'rgba(255,255,255,0.15)',
        borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
                 tooltip: { callbacks: { label: c => fmtN(c.raw) } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 },
             maxTicksLimit: 8 } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', font: { size: 10 },
             callback: v => Math.round(v/1e4)+'만' } }
      }
    }
  });

  // 거래 내역
  const trades = data.trades;
  const tbody  = document.getElementById('bt-trades-body');
  if (!trades || trades.length === 0) {
    tbody.innerHTML = '<div style="padding:2rem;text-align:center;color:#475569">매매 신호 없음</div>';
    return;
  }
  const rows = trades.map(t => {
    const isBuy = t.action === 'BUY';
    const pnl   = !isBuy && t.profit != null
      ? `<span class="${cls(t.profit)}">${fmt(t.profit)}</span>` : '—';
    return `<tr>
      <td>${t.date}</td>
      <td><span class="badge badge-${isBuy ? 'buy' : 'sell'}">${isBuy ? '매수' : '매도'}</span></td>
      <td>${(t.price||0).toLocaleString()}</td>
      <td>${(t.qty||0).toLocaleString()}주</td>
      <td>${pnl}</td>
    </tr>`;
  }).join('');
  tbody.innerHTML = `<table>
    <thead><tr><th>날짜</th><th>구분</th><th>가격</th><th>수량</th><th>손익</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
</script>
</body>
</html>

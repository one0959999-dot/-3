<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라씨 매매비서 — 홈</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── 네비바 ──────────────────────────────────────────── */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user {
      font-size: 0.82rem;
      color: #94a3b8;
    }
    .nav-logout {
      font-size: 0.78rem;
      color: #64748b;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .nav-logout:hover { color: #e6edf3; border-color: rgba(255,255,255,0.25); }

    /* ── 메인 컨텐츠 ──────────────────────────────────────── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── 상단 헤더 ──────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg,#e2e8f0,#94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    .page-header p {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* ── 총자산 배지 ──────────────────────────────────────── */
    .total-asset-badge {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .total-asset-label {
      font-size: 0.78rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
    }
    .total-asset-value {
      font-size: 2.6rem;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -1px;
    }
    .total-asset-value span.unit {
      font-size: 1.1rem;
      color: #94a3b8;
      font-weight: 400;
      margin-left: 4px;
    }

    /* ── 봇 카드 그리드 ────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    .bot-card {
      background: rgba(22,27,34,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: border-color .2s, box-shadow .2s;
    }
    .bot-card:hover {
      border-color: rgba(59,130,246,0.4);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.15), 0 8px 24px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }
    .card-market {
      font-size: 1rem;
      font-weight: 700;
      color: #e6edf3;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-market .flag { font-size: 1.25rem; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.running { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.stopped { background: #4b5563; }
    .status-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-badge.running { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .status-badge.stopped { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

    .card-total {
      font-size: 1.75rem;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .card-total .unit { font-size: 0.85rem; color: #64748b; font-weight: 400; margin-left: 2px; }

    .card-stats {
      display: flex;
      gap: 1.5rem;
      margin: 0.75rem 0 1.25rem;
    }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.7rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-size: 0.9rem; font-weight: 600; }
    .stat-value.up   { color: #f85149; }   /* 상승 = 빨강 (한국 기준) */
    .stat-value.down { color: #58a6ff; }   /* 하락 = 파랑 */
    .stat-value.flat { color: #94a3b8; }

    .card-enter-btn {
      display: block;
      width: 100%;
      padding: 10px 0;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.2px;
    }
    .card-enter-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .card-enter-btn:active { transform: translateY(0); }
    .card-enter-btn.kr { background: linear-gradient(135deg, #b91c1c, #dc2626); }
    .card-enter-btn.us { background: linear-gradient(135deg, #1d4ed8, #2563eb); }

    /* ── 차트 카드 ────────────────────────────────────────── */
    .chart-card {
      background: rgba(22,27,34,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .chart-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .chart-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .chart-period-note {
      font-size: 0.72rem;
      color: #4b5563;
    }
    .chart-wrap { position: relative; height: 200px; }

    /* ── 스켈레톤 ──────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-line { height: 1em; }
    .skel-big  { height: 2.6rem; width: 60%; margin: 0 auto; }

    /* ── 에러 배너 ────────────────────────────────────────── */
    #error-banner {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      font-size: 0.8rem;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── 네비바 ─────────────────────────────────────────────────── -->
<nav class="navbar">
  <span class="nav-logo">라씨 매매비서</span>
  <div class="nav-right">
    <span class="nav-user">{{ user.username }}</span>
    <a href="/logout" class="nav-logout">로그아웃</a>
  </div>
</nav>

<!-- ── 메인 ──────────────────────────────────────────────────── -->
<main class="main">

  <div class="page-header">
    <h1>포트폴리오 현황</h1>
    <p>KR · US 봇 통합 자산 현황입니다</p>
  </div>

  <div id="error-banner"></div>

  <!-- 총자산 배지 -->
  <div class="total-asset-badge">
    <div class="total-asset-label">총 자산 (KRW 환산)</div>
    <div class="total-asset-value" id="total-asset-val">
      <span class="skeleton skel-big">&nbsp;</span>
    </div>
  </div>

  <!-- KR / US 카드 -->
  <div class="cards-grid">

    <!-- KR 카드 -->
    <div class="bot-card">
      <div class="card-header">
        <span class="card-market"><span class="flag">🇰🇷</span> KR 봇</span>
        <span class="status-badge stopped" id="kr-status-badge">
          <span class="status-dot stopped" id="kr-dot"></span>
          <span id="kr-status-text">확인 중...</span>
        </span>
      </div>
      <div class="card-total" id="kr-total">—</div>
      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-label">오늘 실현손익</span>
          <span class="stat-value flat" id="kr-pnl-today">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">수익률</span>
          <span class="stat-value flat" id="kr-pnl-pct">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">보유 종목</span>
          <span class="stat-value flat" id="kr-positions">—</span>
        </div>
      </div>
      <a href="/dashboard" id="kr-enter-btn"
         onclick="setMode(0)"
         class="card-enter-btn kr">KR 대시보드 →</a>
    </div>

    <!-- US 카드 -->
    <div class="bot-card">
      <div class="card-header">
        <span class="card-market"><span class="flag">🇺🇸</span> US 봇</span>
        <span class="status-badge stopped" id="us-status-badge">
          <span class="status-dot stopped" id="us-dot"></span>
          <span id="us-status-text">확인 중...</span>
        </span>
      </div>
      <div class="card-total" id="us-total">—</div>
      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-label">오늘 실현손익</span>
          <span class="stat-value flat" id="us-pnl-today">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">수익률</span>
          <span class="stat-value flat" id="us-pnl-pct">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">보유 종목</span>
          <span class="stat-value flat" id="us-positions">—</span>
        </div>
      </div>
      <a href="/dashboard" id="us-enter-btn"
         onclick="setMode(1)"
         class="card-enter-btn us">US 대시보드 →</a>
    </div>

  </div><!-- /.cards-grid -->

  <!-- 합산 누적 손익 차트 -->
  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-title">합산 누적 실현 손익 (최근 30일)</span>
      <span class="chart-period-note" id="chart-note">KRW 환산</span>
    </div>
    <div class="chart-wrap">
      <canvas id="homeChart"></canvas>
    </div>
  </div>

</main>

<script>
/* ──────────────────────────────────────────────────────────────
   setMode: /api/settings/mode를 호출해 KR(0) or US(1) 화면 전환
   링크 클릭 시 mode를 먼저 설정 → 대시보드 진입
────────────────────────────────────────────────────────────── */
function setMode(isMock) {
  // 비동기 fire-and-forget: 페이지 이동보다 먼저 mode 설정을 시도
  fetch('/api/settings/mode', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({is_mock: isMock}),
    keepalive: true,
  }).catch(() => {});
  // 실제 이동은 href가 처리 (onclick 반환값 true)
}

/* ──────────────────────────────────────────────────────────────
   포맷 헬퍼
────────────────────────────────────────────────────────────── */
function fmtKrw(v) {
  if (v === 0) return '—';
  if (Math.abs(v) >= 100_000_000)
    return (v / 100_000_000).toFixed(2) + '억원';
  if (Math.abs(v) >= 10_000)
    return Math.round(v / 10_000).toLocaleString('ko-KR') + '만원';
  return v.toLocaleString('ko-KR') + '원';
}

function colorClass(v) {
  if (v > 0) return 'up';
  if (v < 0) return 'down';
  return 'flat';
}

function sign(v) { return v > 0 ? '+' : ''; }

/* ──────────────────────────────────────────────────────────────
   차트
────────────────────────────────────────────────────────────── */
let homeChart = null;

function renderChart(labels, values) {
  const ctx = document.getElementById('homeChart').getContext('2d');
  if (homeChart) homeChart.destroy();

  const isPositive = values.length === 0 || values[values.length - 1] >= 0;
  const lineColor  = isPositive ? '#3b82f6' : '#f85149';
  const fillColor  = isPositive ? 'rgba(59,130,246,0.08)' : 'rgba(248,81,73,0.08)';

  homeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        borderColor: lineColor,
        backgroundColor: fillColor,
        borderWidth: 2,
        pointRadius: labels.length > 15 ? 0 : 3,
        pointBackgroundColor: lineColor,
        fill: true,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e6edf3',
          titleFont: { size: 11 },
          bodyFont: { size: 12, weight: '600' },
          callbacks: {
            label: (ctx) => {
              const v = ctx.raw;
              const sign = v >= 0 ? '+' : '';
              return ` 누적 손익: ${sign}${v.toLocaleString('ko-KR')}원`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#4b5563',
            font: { size: 10 },
            maxTicksLimit: 8,
            maxRotation: 0,
          }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: {
            color: '#4b5563',
            font: { size: 10 },
            callback: (v) => {
              if (Math.abs(v) >= 100_000_000) return (v/100_000_000).toFixed(1)+'억';
              if (Math.abs(v) >= 10_000)      return Math.round(v/10_000)+'만';
              return v.toLocaleString('ko-KR');
            }
          }
        }
      }
    }
  });
}

/* ──────────────────────────────────────────────────────────────
   데이터 로드
────────────────────────────────────────────────────────────── */
async function loadSummary() {
  try {
    const res = await fetch('/api/home_summary');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    // ── 총자산 ──
    const total = d.combined_total_krw || 0;
    document.getElementById('total-asset-val').innerHTML =
      total > 0
        ? `${total.toLocaleString('ko-KR')}<span class="unit">원</span>`
        : `<span style="color:#4b5563">데이터 없음</span>`;

    // ── KR 카드 ──
    renderCard('kr', d.kr);

    // ── US 카드 ──
    renderCard('us', d.us);

    // ── 차트 ──
    const chart = d.chart || {};
    const labels = chart.labels || [];
    const values = chart.values || [];

    if (labels.length > 0) {
      renderChart(labels, values);
      document.getElementById('chart-note').textContent =
        `KRW 환산 (환율 ${(d.usd_krw||1350).toLocaleString('ko-KR')}원)`;
    } else {
      document.getElementById('chart-note').textContent = '거래 데이터 없음';
      renderChart([], []);
    }

  } catch (e) {
    console.error('home_summary 로드 오류:', e);
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = '데이터를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도합니다.';
    document.getElementById('total-asset-val').innerHTML =
      `<span style="color:#4b5563">—</span>`;
    setTimeout(loadSummary, 30_000);
  }
}

function renderCard(market, data) {
  if (!data) return;

  const running = data.running;
  const badgeEl = document.getElementById(`${market}-status-badge`);
  const dotEl   = document.getElementById(`${market}-dot`);
  const textEl  = document.getElementById(`${market}-status-text`);

  badgeEl.className = `status-badge ${running ? 'running' : 'stopped'}`;
  dotEl.className   = `status-dot   ${running ? 'running' : 'stopped'}`;
  textEl.textContent = running ? '운영 중' : '정지';

  const total = data.total_krw || 0;
  document.getElementById(`${market}-total`).innerHTML =
    total > 0
      ? `${total.toLocaleString('ko-KR')}<span class="unit">원</span>`
      : `<span style="color:#4b5563;font-size:1rem;">미설정</span>`;

  const todayPnl = data.pnl_today || 0;
  const pnlPct   = data.pnl_pct   || 0;
  const pos      = data.positions  || 0;

  const todayEl = document.getElementById(`${market}-pnl-today`);
  todayEl.textContent = todayPnl !== 0
    ? `${sign(todayPnl)}${fmtKrw(todayPnl)}`
    : '0원';
  todayEl.className = `stat-value ${colorClass(todayPnl)}`;

  const pctEl = document.getElementById(`${market}-pnl-pct`);
  pctEl.textContent = `${sign(pnlPct)}${pnlPct.toFixed(2)}%`;
  pctEl.className = `stat-value ${colorClass(pnlPct)}`;

  document.getElementById(`${market}-positions`).textContent = `${pos}종목`;
}

// 최초 로드 + 30초 자동 갱신
loadSummary();
setInterval(loadSummary, 30_000);
</script>
</body>
</html>
